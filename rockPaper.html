     <div>
   <h2></h2>
    <h1></h1>
    </div>
    </div>
    </div>
    <script>
        document.body.style.margin=0;
        document.body.style.padding=0;
        let arr=["Rock","Scissor","Paper"]
        let container=document.getElementsByTagName("div")[1]
        container.style.display="flex"
        container.style.justifyContent="center"
        container.style.alignItems="center"
        container.style.height="100vh"
        container.style.backgroundColor="black"

        let div1=document.getElementsByTagName("div")[2]
        div1.style.backgroundColor="white"
        div1.style.height="400px"
         div1.style.width="400px"
         div1.style.display="flex"
         div1.style.justifyContent="center"
         div1.style.alignItems="center"
         div1.style.flexDirection="column"
         div1.style.gap="10px"
         div1.style.padding="20px"

         let button=document.getElementsByTagName("button")[0]
         button.style.height="50px"
         button.style.width="150px"
         button.style.borderRadius="10Px"

          let button2=document.getElementsByTagName("button")[1]
         button2.style.height="50px"
         button2.style.width="150px"
           button2.style.borderRadius="10Px"

          let button3=document.getElementsByTagName("button")[2]
         button3.style.height="50px"
           button3.style.borderRadius="10Px"
         button3.style.width="150px"


        let h2=document.getElementsByTagName("h2")[0]
          let p=document.getElementsByTagName("h1")[0]
        let btn1=document.getElementsByTagName("button")[0]
        btn1.innerText="Rock"




        let btn2=document.getElementsByTagName("button")[1]
        btn2.innerText="Scissor"

        let btn3=document.getElementsByTagName("button")[2]
        btn3.innerText="Paper"


        btn1.addEventListener("click",()=>{
let computer=Math.floor(Math.random()*3)
       if(arr[computer]==="Rock"){
        h2.innerText=`You choosed Rock.Computer Choosed ${arr[computer]}`
        p.innerText="TIE"
       }else if(arr[computer]==="Scissor"){
       h2.innerText=`You choosed Rock.Computer Choosed ${arr[computer]}`
        p.innerText="You Win"
       }
       else{
        h2.innerText=`You choosed Rock.Computer Choosed ${arr[computer]}`
        p.innerText="You Loose"
       }
        })
        

        
        btn2.addEventListener("click",()=>{
let computer=Math.floor(Math.random()*3)
       if(arr[computer]==="Rock"){
        h2.innerText=`You choosed Scissor.Computer Choosed ${arr[computer]}`
       p.innerText="You Loose"
       }else if(arr[computer]==="Scissor"){
       h2.innerText=`You choosed Scissor.Computer Choosed ${arr[computer]}`
       p.innerText="TIE"
       }
       else{
       h2.innerText=`You choosed Scissor.Computer Choosed ${arr[computer]}`
       p.innerText="You WIN"
       }
        })
  
            
        btn3.addEventListener("click",()=>{
let computer=Math.floor(Math.random()*3)
       if(arr[computer]==="Rock"){
       h2.innerText=`You choosed Paper.Computer Choosed ${arr[computer]}`
       p.innerText="You Win"
       }else if(arr[computer]==="Scissor"){
       h2.innerText=`You choosed Paper.Computer Choosed ${arr[computer]}`
       p.innerText="You Loose"
       }
       else{
       h2.innerText=`You choosed Paper.Computer Choosed ${arr[computer]}`
       p.innerText="TIE"
       }
        })
  
    </script>
